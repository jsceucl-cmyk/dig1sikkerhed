
<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digitalisering 1 – OK / IKKE OK (10 scenarier)</title>
<style>
    :root{
        --ok:#2e7d32;        /* grøn */
        --notok:#c62828;     /* rød */
        --card:#ffffff;
        --bg:#f4f7fb;
        --accent:#0f4c81;
    }
    html,body{margin:0;padding:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#111}
    header{max-width:1100px;margin:18px auto 8px auto;padding:0 16px;text-align:center}
    header img.logo{max-width:620px;width:100%;height:auto;display:block;margin:0 auto 6px auto}
    header h1{font-size:clamp(20px,2.6vw,28px);margin:6px 0 0 0;color:var(--accent)}
    header p.sub{margin:4px 0 12px 0;opacity:.8}

    .wrap{max-width:1100px;margin:0 auto 60px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .card{background:var(--card);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:14px;display:flex;flex-direction:column}
    .card h3{margin:6px 0 4px 0;font-size:18px}
    .card p{margin:4px 0 8px 0;font-size:14px}
    .media{background:#eef3f9;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:150px;margin:6px 0 10px 0}
    .media img{max-width:100%;border-radius:6px}
    .btns{display:flex;gap:8px;margin-top:auto}
    .btn{flex:1 1 0;border:none;border-radius:10px;padding:10px 12px;font-weight:600;cursor:pointer;color:#fff;font-size:15px}
    .btn.ok{background:var(--ok)}
    .btn.notok{background:var(--notok)}
    .feedback{margin-top:8px;font-size:14px;font-weight:600}
    .right{color:var(--ok)}
    .wrong{color:var(--notok)}

    .scorebar{position:sticky;bottom:0;left:0;right:0;background:#0f1b2a;color:#fff;padding:10px 16px;display:flex;gap:16px;align-items:center;justify-content:space-between}
    .scorebar .actions{display:flex;gap:8px}
    .scorebar button{background:#ffffff; color:#0f1b2a; border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}

    .hint{font-size:13px;opacity:.8}
</style>
</head>
<body>
<header>
    <img class="logo" src="LOGO.png" alt="DIGITALISERING 1" />
    <h1>OK / IKKE OK – Internet • Intranet • Produktionsnet • Phishing • USB • Adgang</h1>
    <p class="sub">Vælg det rigtige svar for hvert scenarie. Brug din viden fra Dag 2 om netværk og datasikkerhed.</p>
</header>

<div class="wrap">
    <div id="cards" class="grid"></div>
</div>

<div class="scorebar">
    <div><strong>Resultat:</strong> <span id="score">0</span>/10 rigtige <span class="hint">(Klik “Nulstil” for at prøve igen)</span></div>
    <div class="actions">
        <button id="showAnswers">Vis facit</button>
        <button id="reset">Nulstil</button>
    </div>
</div>

<script>
const scenarios = [
  {
    id: 'Phishing_mail',
    title: 'Phishing‑mail med ukendt link',
    text: 'Du modtager en mail med et “Log ind her” link fra en ukendt afsender.',
    img: 'scenarios/Phishing_mail.png',
    okCorrect: false,
    explain: 'Klik aldrig på ukendte links. Tjek afsender og rapportér som phishing.'
  },
  {
    id: 'Fundet_USB',
    title: 'Fundet USB‑stick på gulvet',
    text: 'Du finder et USB‑stick ved kaffemaskinen og vil tjekke indholdet.',
    img: 'scenarios/Fundet_USB.png',
    okCorrect: false,
    explain: 'Brug aldrig ukendte USB‑enheder. Aflever den til IT.'
  },
  {
    id: 'Intranet_login',
    title: 'Login på virksomhedens intranet',
    text: 'Du logger på intranettet via godkendt adresse og to‑faktor.',
    img: 'scenarios/Intranet_login.png',
    okCorrect: true,
    explain: 'God praksis: Officiel adresse + to‑faktor godkendelse.'
  },
  {
    id: 'Password_postit',
    title: 'Password på post‑it under tastaturet',
    text: 'Adgangskoden er skrevet ned og gemt i skuffen.',
    img: 'scenarios/Password_postit.png',
    okCorrect: false,
    explain: 'Adgangskoder må ikke skrives ned. Brug stærk, unik kode + evt. password manager.'
  },
  {
    id: 'Ukendt_wifi',
    title: 'Forbinder til ukendt WiFi',
    text: 'Du forbinder til et åbent gæste‑WiFi i produktionen.',
    img: 'scenarios/Ukendt_wifi.png',
    okCorrect: false,
    explain: 'Brug kun godkendte netværk (produktion/virksomhed). Åbne netværk kan aflytte trafikken.'
  },
  {
    id: 'Deling_af_filer',
    title: 'Deling af filer via godkendt Teams‑kanal',
    text: 'Du deler en SOP‑PDF med dit hold i virksomhedens Teams‑kanal.',
    img: 'scenarios/Deling_af_filer.png',
    okCorrect: true,
    explain: 'God praksis: Del dokumenter i godkendte kanaler med rette rettigheder.'
  },
  {
    id: 'Privat_udstyr_paa_net',
    title: 'Privat udstyr på produktionsnettet',
    text: 'En privat tablet kobles på produktionsnettet for “lige at tjekke mail”.',
    img: 'scenarios/Privat_udstyr_på_net.png',
    okCorrect: false,
    explain: 'Privat udstyr må ikke på produktionsnettet. Brug kun godkendte enheder.'
  },
  {
    id: 'Udlaane_badge',
    title: 'Låne adgangsbadge til kollega',
    text: 'Kollega har glemt sin badge – du låner din ud.',
    img: 'scenarios/Udlåne_badge.png',
    okCorrect: false,
    explain: 'Adgangsbadge er personlig. Henvís til reception/IT for midlertidig adgang.'
  },
  {
    id: 'QR_kode_ukendt',
    title: 'Scanner ukendt QR‑kode i produktionen',
    text: 'En QR‑kode uden afsender ligger på en maskine – du scanner for at se indholdet.',
    img: 'scenarios/QR_kode_ukendt.png',
    okCorrect: false,
    explain: 'Ukendte QR‑koder kan lede til skadelige sider. Brug kun officielle, kendte koder.'
  },
  {
    id: 'Download_ukendt_app',
    title: 'Downloader ukendt app på arbejds‑tablet',
    text: 'En “gratis viewer” installeres for at læse en fil.',
    img: 'scenarios/Download_ukendt_app.png',
    okCorrect: false,
    explain: 'Installer kun godkendte apps fra virksomhedens liste/app‑styring.'
  }
];

const cardsEl = document.getElementById('cards');
let score = 0, answered = 0;

function render(){
  cardsEl.innerHTML = '';
  scenarios.forEach((s, idx)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${idx+1}. ${s.title}</h3>
      <p>${s.text}</p>
      <div class="media"><img src="${s.img}" alt="${s.id}"/></div>
      <div class="btns">
        <button class="btn notok" data-id="${s.id}" data-choice="false">IKKE OK</button>
        <button class="btn ok" data-id="${s.id}" data-choice="true">OK</button>
      </div>
      <div class="feedback" id="fb-${s.id}"></div>
    `;
    cardsEl.appendChild(card);
  });

  document.querySelectorAll('.btn').forEach(btn=>{
    btn.addEventListener('click', onAnswer);
  });
}

function onAnswer(e){
  const choice = e.currentTarget.dataset.choice === 'true';
  const id = e.currentTarget.dataset.id;
  const s = scenarios.find(x=>x.id===id);
  const fb = document.getElementById('fb-'+id);
  // disable buttons for this card
  const parent = e.currentTarget.closest('.card');
  parent.querySelectorAll('.btn').forEach(b=> b.disabled = true);
  answered++;
  if(choice === s.okCorrect){
    score++;
    fb.innerHTML = `<span class="right">✔ Korrekt.</span> ${s.explain}`;
  } else {
    fb.innerHTML = `<span class="wrong">✘ Ikke korrekt.</span> ${s.explain}`;
  }
  document.getElementById('score').textContent = score;
}

document.getElementById('reset').addEventListener('click', ()=>{
  score = 0; answered = 0; document.getElementById('score').textContent = score; render();
});

document.getElementById('showAnswers').addEventListener('click', ()=>{
  // show all explanations and lock cards
  document.querySelectorAll('.card').forEach((card, i)=>{
    const s = scenarios[i];
    card.querySelectorAll('.btn').forEach(b=> b.disabled = true);
    const fb = card.querySelector('.feedback');
    const label = s.okCorrect ? 'OK' : 'IKKE OK';
    fb.innerHTML = `<span class="right">Facit: ${label}</span> – ${s.explain}`;
  });
});

render();
</script>
</body>
</html>
